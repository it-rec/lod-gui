<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main class="page">
    <article class="page__panel">
      <header class="page__header">
        <h1>{{ page.title }}</h1>
        {% if page.parent %}
          <p class="crumbs"><a href="{{ '/features/' | relative_url }}">Features</a> · {{ page.title }}</p>
        {% endif %}
      </header>
      <div class="page__body">
        {{ content }}
      </div>
    </article>
  </main>
  {% include footer.html %}
</body>
</html>
