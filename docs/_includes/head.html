<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5a0c0e" />
<title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}" />
<link rel="apple-touch-icon" href="{{ '/assets/logo192.png' | relative_url }}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
