title: LoD — Campaign Companion
description: A real-time companion app for the storytelling board game Legacy of Dragonholt.

# No theme — the site uses the custom layouts under _layouts.
markdown: kramdown
highlighter: rouge
permalink: pretty

# Rewrite relative .md links to their rendered URLs so the same Markdown
# reads correctly both on GitHub and on the published Pages site.
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - screenshots
  - features
  - assets

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: default
