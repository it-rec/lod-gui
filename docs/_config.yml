title: LoD — Campaign Companion
description: A real-time companion app for the storytelling board game Legacy of Dragonholt.
theme: jekyll-theme-cayman

# Build settings
markdown: kramdown
highlighter: rouge

# Rewrite relative .md links to their rendered URLs so the docs read
# correctly both on GitHub itself and on the published Pages site.
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Treat README-style index files as the directory's index page.
include:
  - screenshots
  - features

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
