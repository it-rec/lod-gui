# Builds the Jekyll site under ./docs and deploys it to GitHub Pages.
# Triggers on pushes to master (only when the docs change) and manually.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [ "master" ]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only one concurrent deployment per ref — newer pushes cancel in-progress runs.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
