# Install dependencies, run tests, and build the app on every push and PR.
# The project uses Bun as its package manager and runtime — see .bun-version.

name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version
    - run: bun install --frozen-lockfile
    - run: bun run test
    - run: bun run build
